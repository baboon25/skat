<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Skat</title>
  <style>
    body { font-family: sans-serif; background: #1a5c2a; color: white; padding: 20px; }
    h1 { text-align: center; }

    #status { text-align: center; font-size: 1.2em; margin: 10px 0; min-height: 1.5em; }

    #table-cards { display: flex; gap: 10px; justify-content: center; min-height: 60px;
      margin: 20px 0; }

    #hand { display: none; flex-wrap: wrap; gap: 8px; justify-content: center; margin: 20px 0; }

    .card-btn { background: white; color: black; border: 2px solid #333; border-radius: 8px;
      padding: 10px 14px; font-size: 1.2em; cursor: pointer; }
    .card-btn:hover { background: #eee; }
    .card.red { color: red; }
    .card.black { color: black; }

    #bid-area { display: none; text-align: center; margin: 20px 0; }
    #bid-area button { margin: 4px; padding: 6px 12px; cursor: pointer; }
    #bid-buttons { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center;
      max-width: 600px; margin: 10px auto; }

    #announce-area { display: none; text-align: center; margin: 20px 0; }
    #announce-area button { margin: 4px; padding: 8px 16px; font-size: 1em; cursor: pointer; }

    #take-off-area { display: none; text-align: center; margin: 20px 0; }
    #take-off-area input { width: 80px; font-size: 1em; padding: 4px; }
    #take-off-area button { padding: 8px 16px; font-size: 1em; cursor: pointer; }

    #start-btn { display: block; margin: 20px auto; padding: 12px 32px;
      font-size: 1.2em; cursor: pointer; background: #2d8a4e; color: white;
      border: none; border-radius: 8px; }
    #start-btn:hover { background: #247040; }
  </style>
</head>
<body>
  <h1>Skat</h1>

  <div id="status">Bereit</div>
  <div id="game-type" style="text-align: center; font-size: 1em; opacity: 0.8; min-height: 1.2em;"></div>

  <div id="table-cards"></div>

  <!-- Hand des Spielers -->
  <div id="hand"></div>

  <!-- Ansage-Bereich -->
  <div id="announce-area">
    <p>Wähle dein Spiel:</p>
    <button onclick="skatApp.announce(0)">Grand</button>
    <button onclick="skatApp.announce(1)">Null</button>
    <button onclick="skatApp.announce(2)">&#9827; Kreuz</button>
    <button onclick="skatApp.announce(3)">&#9824; Pik</button>
    <button onclick="skatApp.announce(4)">&#9829; Herz</button>
    <button onclick="skatApp.announce(5)">&#9830; Karo</button>
  </div>

  <!-- Reiz-Bereich -->
  <div id="bid-area">
    <p id="bid-current"></p>
    <input type="hidden" id="bid-mode" value="bid" />
    <div id="bid-buttons"></div>
    <button onclick="skatApp.bid(0)">Passe</button>
  </div>

  <!-- Skat-Bereich -->
  <div id="skat-area" style="display: none; text-align: center; margin: 10px 0;">
    <p>Klicke zwei Karten zum Drücken an</p>
  </div>

  <!-- Abheben-Bereich -->
  <div id="take-off-area">
    <p>Wo abheben? (1 &#8211; <span id="take-off-max">32</span>)</p>
    <input type="number" id="take-off-val" min="1" value="16" />
    <button onclick="skatApp.takeOff()">Abheben</button>
  </div>

  <button id="start-btn" onclick="skatApp.startGame()">Neues Spiel</button>

  <script type="module">
    import init, { start_game, LocalPlayer } from './pkg/skat.js';

    await init();

    const BID_VALUES = [
      18, 20, 22, 23, 24, 27, 30, 33, 35, 36,
      40, 44, 46, 48, 50, 54, 55, 59, 60, 63,
      66, 70, 72, 77, 80, 81, 84, 88, 90, 92,
      96, 100, 102, 108, 110
    ];

    const bidButtons = document.getElementById('bid-buttons');
    for (const v of BID_VALUES) {
      const btn = document.createElement('button');
      btn.textContent = v;
      btn.onclick = () => skatApp.bid(v);
      bidButtons.appendChild(btn);
    }

    window.skatApp = {
      startGame() { start_game(); },
      playCard(i) {
        const skatArea = document.getElementById('skat-area');
        if (skatArea.style.display !== 'none') {
          LocalPlayer.select_skat_card(i);
        } else {
          LocalPlayer.play_card(i);
        }
      },
      bid(value) {
        const mode = document.getElementById('bid-mode').value;
        if (mode === 'listen') {
          LocalPlayer.submit_listen(value > 0);
        } else {
          LocalPlayer.submit_bid(value);
        }
      },
      announce(gameType) { LocalPlayer.submit_announce(gameType); },
      takeOff() {
        const idx = parseInt(document.getElementById('take-off-val').value) || 16;
        LocalPlayer.submit_take_off(idx);
      },
    };
  </script>
</body>
</html>
